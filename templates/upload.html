<!DOCTYPE html>
<html>
<head>
    <title>Upload Crowd</title>

    <!-- ✅ REQUIRED for mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-size: 15px;
        }

        .card {
            border-radius: 15px;
        }

        .form-control {
            padding: 12px;
            font-size: 15px;
        }

        .btn-submit {
            padding: 14px;
            font-size: 16px;
            border-radius: 10px;
        }

        /* Mobile tweaks */
        @media (max-width: 768px) {

            .container {
                margin-top: 20px !important;
                padding: 10px;
            }

            h3 {
                font-size: 20px;
            }
        }
    </style>
</head>

<body class="bg-light">

<div class="container">

    <div class="card shadow p-4 mx-auto text-center mt-4" style="max-width: 500px;">

        <h3 class="mb-2">📸 Upload Crowd</h3>
        <p class="text-muted mb-4">Detect and mark attendance automatically</p>

        <form method="POST" enctype="multipart/form-data">

            <!-- IMAGE UPLOAD -->
            <div class="mb-3 text-start">
                <label class="form-label">Upload Crowd Image</label>
                <input type="file" name="image" class="form-control" accept="image/*" required>
            </div>

            <!-- TIME INPUT -->
            <div class="mb-4 text-start">
                <label class="form-label">Enter Time</label>
                <input type="time" name="time" class="form-control" required>
            </div>

            <!-- BUTTON -->
            <button type="submit" class="btn btn-success w-100 btn-submit shadow-sm">
                🚀 Process Attendance
            </button>

        </form>

        <!-- BACK -->
        <div class="mt-3">
            <a href="/" class="text-decoration-none">← Back to Dashboard</a>
        </div>

    </div>

</div>

</body>
</html>
