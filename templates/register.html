<!DOCTYPE html>
<html>
<head>
    <title>Register Face</title>

    <!-- ✅ Required for mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-size: 15px;
        }

        .card {
            border-radius: 15px;
        }

        .form-control {
            padding: 12px;
            font-size: 15px;
        }

        .btn-submit {
            padding: 14px;
            font-size: 16px;
            border-radius: 10px;
        }

        /* Mobile spacing */
        @media (max-width: 768px) {
            .container {
                margin-top: 20px !important;
                padding: 10px;
            }

            h3 {
                font-size: 20px;
            }
        }
    </style>
</head>

<body class="bg-light">

<div class="container">

    <div class="card shadow p-4 mx-auto mt-4" style="max-width: 500px;">

        <h3 class="text-center mb-2">👤 Register Face</h3>
        <p class="text-muted text-center mb-4">Add a new person to the system</p>

        <form method="POST" enctype="multipart/form-data">

            <!-- NAME -->
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-control" placeholder="Enter name" required>
            </div>

            <!-- GROUP -->
            <div class="mb-3">
                <label class="form-label">Group</label>
                <input type="text" name="group" class="form-control" placeholder="e.g Class A" required>
            </div>

            <!-- IMAGE -->
            <div class="mb-4">
                <label class="form-label">Upload Face Image</label>
                <input type="file" name="image" class="form-control" accept="image/*" required>
            </div>

            <!-- BUTTON -->
            <button type="submit" class="btn btn-primary w-100 btn-submit shadow-sm">
                ➕ Register Face
            </button>

        </form>

        <!-- BACK -->
        <div class="text-center mt-3">
            <a href="/" class="text-decoration-none">← Back to Dashboard</a>
        </div>

    </div>

</div>

</body>
</html>
